<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retraite — Athènes · Marseille</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B2A4A;
  --navy-light: #2a3f6a;
  --gold: #C9A84C;
  --gold-light: #e8c97a;
  --cream: #F5F1E8;
  --cream-dark: #EDE8DB;
  --ink: #1a1a1a;
  --ink-muted: #5a5a5a;
  --ink-faint: #9a9a9a;
  --green: #2D6A4F;
  --amber: #B8860B;
  --red: #8B2020;
  --border: rgba(26,42,74,0.12);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --mono: 'DM Mono', monospace;
}

html, body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
}

/* HEADER */
header {
  border-bottom: 1px solid var(--border);
  padding: 2rem 2.5rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  background: #fff;
}
.title-block h1 {
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--navy);
  line-height: 1.1;
}
.title-block h1 em { font-style: italic; color: var(--gold); }
.title-block p {
  margin-top: 4px;
  font-size: 0.8rem;
  font-family: var(--mono);
  color: var(--ink-faint);
  letter-spacing: 0.05em;
}
.identity-block {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.user-label {
  font-size: 0.72rem;
  font-family: var(--mono);
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.user-select {
  display: flex;
  gap: 8px;
}
.user-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: transparent;
  font-family: var(--serif);
  font-size: 0.85rem;
  cursor: pointer;
  color: var(--ink-muted);
  transition: all 0.2s;
}
.user-btn:hover { border-color: var(--navy); color: var(--navy); }
.user-btn.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

/* SYNC STATUS */
.sync-bar {
  background: var(--cream-dark);
  border-bottom: 1px solid var(--border);
  padding: 6px 2.5rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--ink-faint);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink-faint);
  transition: background 0.3s;
}
.sync-dot.synced { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAIN LAYOUT */
main { max-width: 960px; margin: 0 auto; padding: 2.5rem 2rem; }

/* TABS */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}
.tab-btn {
  padding: 8px 20px;
  border: none;
  background: none;
  font-family: var(--serif);
  font-size: 0.9rem;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--navy); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); font-weight: 500; }

.panel { display: none; }
.panel.active { display: block; }

/* SCORECARD */
.score-grid {
  display: grid;
  grid-template-columns: 1fr 180px 180px;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  background: #fff;
}
.sg-header {
  background: var(--navy);
  color: #fff;
  padding: 12px 16px;
  font-size: 0.75rem;
  font-family: var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.sg-header.dest {
  text-align: center;
  border-left: 1px solid rgba(255,255,255,0.1);
}
.sg-row {
  display: contents;
}
.sg-row > div {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  transition: background 0.15s;
}
.sg-row:last-child > div { border-bottom: none; }
.sg-row > div:last-child { border-right: none; }
.sg-crit-name {
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--ink);
}
.sg-crit-weight {
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--ink-faint);
  margin-top: 3px;
}
.sg-score-cell {
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
}
.sg-score-cell:hover { background: var(--cream); }
.score-badge {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  font-weight: 500;
  color: #fff;
  transition: transform 0.15s;
  flex-shrink: 0;
}
.score-badge:hover { transform: scale(1.1); }
.edit-icon { font-size: 0.65rem; color: var(--ink-faint); opacity: 0; transition: opacity 0.15s; }
.sg-score-cell:hover .edit-icon { opacity: 1; }
.sg-total-row > div {
  background: var(--navy);
  padding: 14px 16px;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.sg-total-row > div:last-child { border-right: none; }
.sg-total-label {
  font-size: 0.75rem;
  font-family: var(--mono);
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.sg-total-score {
  font-size: 1.6rem;
  font-weight: 300;
  color: var(--gold);
  text-align: center;
}

/* ANNOTATIONS */
.annotations { margin-top: 2rem; }
.annot-title {
  font-size: 0.75rem;
  font-family: var(--mono);
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.annot-list { display: flex; flex-direction: column; gap: 8px; }
.annot-item {
  display: grid;
  grid-template-columns: 160px 1fr auto;
  gap: 12px;
  align-items: start;
  padding: 10px 14px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
}
.annot-author {
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--ink-faint);
  padding-top: 2px;
}
.annot-author strong { color: var(--navy); display: block; }
.annot-text { font-size: 0.88rem; color: var(--ink); line-height: 1.5; }
.annot-del { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 0.8rem; }
.annot-del:hover { color: var(--red); }

/* ADD ANNOTATION */
.add-annot {
  margin-top: 1rem;
  display: flex;
  gap: 8px;
}
.add-annot textarea {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--serif);
  font-size: 0.88rem;
  resize: none;
  height: 60px;
  background: #fff;
  color: var(--ink);
}
.add-annot textarea:focus { outline: none; border-color: var(--navy); }
.add-annot button {
  padding: 8px 16px;
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: var(--serif);
  font-size: 0.85rem;
  cursor: pointer;
  align-self: flex-end;
}
.add-annot button:hover { background: var(--navy-light); }

/* RANKING */
.ranking-wrap { padding: 0.5rem 0; }
.rank-dest {
  margin-bottom: 2rem;
}
.rank-name {
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--navy);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.rank-total {
  font-size: 0.75rem;
  font-family: var(--mono);
  color: var(--ink-faint);
}
.rank-bars { display: flex; flex-direction: column; gap: 6px; }
.rank-bar-row {
  display: grid;
  grid-template-columns: 140px 1fr 30px;
  align-items: center;
  gap: 10px;
  font-size: 0.8rem;
}
.rank-crit-name { color: var(--ink-muted); font-size: 0.78rem; }
.rank-track {
  height: 18px;
  background: var(--cream-dark);
  border-radius: 2px;
  overflow: hidden;
}
.rank-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}
.rank-val { font-family: var(--mono); font-size: 0.72rem; color: var(--ink-muted); text-align: right; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #fff;
  border-radius: 4px;
  padding: 2rem;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal h3 { font-size: 1.1rem; font-weight: 400; color: var(--navy); margin-bottom: 0.5rem; }
.modal p { font-size: 0.8rem; color: var(--ink-faint); font-family: var(--mono); margin-bottom: 1.5rem; }
.score-slider-wrap { margin: 1rem 0; }
.score-display {
  font-size: 3rem;
  font-weight: 300;
  color: var(--navy);
  text-align: center;
  font-family: var(--serif);
  margin-bottom: 0.5rem;
}
input[type=range] {
  width: 100%;
  accent-color: var(--navy);
  cursor: pointer;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }
.btn-cancel {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px;
  background: none; font-family: var(--serif); cursor: pointer; color: var(--ink-muted);
}
.btn-save {
  padding: 8px 20px; background: var(--navy); color: #fff;
  border: none; border-radius: 4px; font-family: var(--serif); cursor: pointer;
}
.btn-save:hover { background: var(--navy-light); }

/* WEIGHT PANEL */
.weights-grid {
  display: flex; flex-direction: column; gap: 1px;
  border: 1px solid var(--border);
  border-radius: 4px; overflow: hidden;
  background: #fff;
}
.weight-row {
  display: grid;
  grid-template-columns: 1fr 180px 60px;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}
.weight-row:last-child { border-bottom: none; }
.weight-name { font-size: 0.95rem; color: var(--ink); }
.weight-slider { width: 100%; accent-color: var(--gold); }
.weight-val {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--navy);
  text-align: right;
}
.weight-note { font-size: 0.75rem; color: var(--ink-faint); font-family: var(--mono); margin-top: 1rem; }

/* FOOTER */
footer {
  text-align: center;
  padding: 2rem;
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  border-top: 1px solid var(--border);
  margin-top: 3rem;
}

@media (max-width: 600px) {
  header { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .score-grid { grid-template-columns: 1fr 130px 130px; }
  main { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>Retraite — <em>Athènes · Marseille</em></h1>
    <p>outil de décision partagé · étienne & nina</p>
  </div>
  <div class="identity-block">
    <span class="user-label">Je suis</span>
    <div class="user-select">
      <button class="user-btn active" id="btn-etienne" onclick="setUser('Étienne')">Étienne</button>
      <button class="user-btn" id="btn-nina" onclick="setUser('Nina')">Nina</button>
    </div>
  </div>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-status">chargement…</span>
</div>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('scorecard',this)">Scorecard</button>
    <button class="tab-btn" onclick="showTab('ranking',this)">Analyse</button>
    <button class="tab-btn" onclick="showTab('weights',this)">Pondérations</button>
    <button class="tab-btn" onclick="showTab('notes',this)">Notes partagées</button>
  </div>

  <div id="scorecard" class="panel active">
    <div class="score-grid" id="score-grid"></div>
  </div>

  <div id="ranking" class="panel">
    <div class="ranking-wrap" id="ranking-wrap"></div>
  </div>

  <div id="weights" class="panel">
    <div class="weights-grid" id="weights-grid"></div>
    <p class="weight-note">les pondérations s'appliquent au calcul du total — modifiez selon vos priorités</p>
  </div>

  <div id="notes" class="panel">
    <div class="annotations">
      <div class="annot-title">Notes & réflexions</div>
      <div class="annot-list" id="annot-list"></div>
      <div class="add-annot">
        <textarea id="annot-input" placeholder="Ajouter une réflexion…"></textarea>
        <button onclick="addAnnotation()">Ajouter</button>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Modifier le score</h3>
    <p id="modal-subtitle"></p>
    <div class="score-slider-wrap">
      <div class="score-display" id="score-display">7</div>
      <input type="range" min="1" max="10" value="7" id="score-slider" oninput="updateSlider(this.value)">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveScore()">Enregistrer</button>
    </div>
  </div>
</div>

<footer>mise à jour automatique · partagé entre étienne & nina · version 1.0</footer>

<script>
const STORAGE_KEY = 'retraite_athenes_marseille_v1';

const DEFAULT_STATE = {
  version: 1,
  destinations: [
    { id: "athenes", label: "Athènes", emoji: "🇬🇷" },
    { id: "marseille", label: "Marseille", emoji: "🇫🇷" }
  ],
  criteria: [
    { id: "cout_vie", label: "Coût de la vie", weight: 4, scores: { athenes: 8, marseille: 6 } },
    { id: "sante", label: "Accès santé", weight: 5, scores: { athenes: 5, marseille: 8 } },
    { id: "vols", label: "Vol direct Stockholm", weight: 3, scores: { athenes: 9, marseille: 3 } },
    { id: "immo", label: "Prix €/m²", weight: 3, scores: { athenes: 8, marseille: 5 } },
    { id: "gastro", label: "Gastronomie", weight: 3, scores: { athenes: 7, marseille: 9 } },
    { id: "liens", label: "Probabilité de liens", weight: 5, scores: { athenes: 5, marseille: 9 } }
  ],
  annotations: [],
  lastModifiedBy: null,
  lastModifiedAt: null
};

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
let currentUser = 'Étienne';
let editingCrit = null;
let editingDest = null;
let pollingInterval = null;

// --- STORAGE ---
async function loadState() {
  setSyncing();
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      const saved = JSON.parse(result.value);
      state = { ...DEFAULT_STATE, ...saved };
    }
    setSynced();
  } catch(e) {
    setSynced();
  }
  renderAll();
}

async function saveState() {
  setSyncing();
  state.lastModifiedBy = currentUser;
  state.lastModifiedAt = new Date().toISOString();
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
    setSynced();
  } catch(e) {
    setSynced();
  }
  renderAll();
}

function setSyncing() {
  document.getElementById('sync-dot').className = 'sync-dot syncing';
  document.getElementById('sync-status').textContent = 'synchronisation…';
}
function setSynced() {
  document.getElementById('sync-dot').className = 'sync-dot synced';
  const who = state.lastModifiedBy;
  const when = state.lastModifiedAt ? new Date(state.lastModifiedAt).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('sync-status').textContent = who
    ? `synchronisé · dernière modification par ${who} à ${when}`
    : 'synchronisé';
}

// --- RENDER ---
function scoreColor(s) {
  if (s >= 8) return '#2D6A4F';
  if (s >= 6) return '#B8860B';
  return '#8B2020';
}

function weightedTotal(destId) {
  let sum = 0, tw = 0;
  state.criteria.forEach(c => { sum += c.scores[destId] * c.weight; tw += c.weight; });
  return Math.round((sum / tw) * 10) / 10;
}

function renderScorecard() {
  let html = '';
  // headers
  html += `<div class="sg-header">Critère</div>`;
  state.destinations.forEach(d => {
    html += `<div class="sg-header dest">${d.emoji} ${d.label}</div>`;
  });
  // rows
  state.criteria.forEach(c => {
    html += `<div><div class="sg-crit-name">${c.label}</div><div class="sg-crit-weight">poids ×${c.weight}</div></div>`;
    state.destinations.forEach(d => {
      const s = c.scores[d.id];
      html += `<div class="sg-score-cell" onclick="openModal('${c.id}','${d.id}')">
        <span class="score-badge" style="background:${scoreColor(s)}">${s}</span>
        <span class="edit-icon">✎</span>
      </div>`;
    });
  });
  // total row
  html += `<div class="sg-total-row" style="display:contents">
    <div><div class="sg-total-label">Total pondéré</div></div>`;
  state.destinations.forEach(d => {
    html += `<div><div class="sg-total-score">${weightedTotal(d.id)}</div></div>`;
  });
  html += `</div>`;
  document.getElementById('score-grid').innerHTML = html;
}

function renderRanking() {
  const totals = state.destinations.map(d => ({ ...d, total: weightedTotal(d.id) }))
    .sort((a,b) => b.total - a.total);
  let html = '';
  totals.forEach((d, rank) => {
    html += `<div class="rank-dest">
      <div class="rank-name">${d.emoji} ${d.label} <span class="rank-total">— total ${d.total}/10</span></div>
      <div class="rank-bars">`;
    state.criteria.forEach(c => {
      const s = c.scores[d.id];
      const pct = Math.round(s * 10);
      html += `<div class="rank-bar-row">
        <div class="rank-crit-name">${c.label}</div>
        <div class="rank-track"><div class="rank-fill" style="width:${pct}%;background:${scoreColor(s)}"></div></div>
        <div class="rank-val">${s}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('ranking-wrap').innerHTML = html;
}

function renderWeights() {
  let html = '';
  state.criteria.forEach(c => {
    html += `<div class="weight-row">
      <div class="weight-name">${c.label}</div>
      <input class="weight-slider" type="range" min="1" max="5" value="${c.weight}"
        oninput="updateWeight('${c.id}', this.value, this.nextElementSibling)"
        onchange="saveState()">
      <div class="weight-val">×${c.weight}</div>
    </div>`;
  });
  document.getElementById('weights-grid').innerHTML = html;
}

function renderAnnotations() {
  const list = document.getElementById('annot-list');
  if (!state.annotations || state.annotations.length === 0) {
    list.innerHTML = `<p style="font-size:0.82rem;color:var(--ink-faint);font-family:var(--mono);padding:8px 0">aucune note pour l'instant</p>`;
    return;
  }
  let html = '';
  state.annotations.forEach((a, i) => {
    const when = new Date(a.at).toLocaleDateString('fr-FR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    html += `<div class="annot-item">
      <div class="annot-author"><strong>${a.author}</strong>${when}</div>
      <div class="annot-text">${a.text}</div>
      <button class="annot-del" onclick="deleteAnnotation(${i})">✕</button>
    </div>`;
  });
  list.innerHTML = html;
}

function renderAll() {
  renderScorecard();
  renderRanking();
  renderWeights();
  renderAnnotations();
}

// --- INTERACTIONS ---
function setUser(name) {
  currentUser = name;
  document.getElementById('btn-etienne').classList.toggle('active', name === 'Étienne');
  document.getElementById('btn-nina').classList.toggle('active', name === 'Nina');
}

function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function openModal(critId, destId) {
  editingCrit = critId;
  editingDest = destId;
  const c = state.criteria.find(x => x.id === critId);
  const d = state.destinations.find(x => x.id === destId);
  const s = c.scores[destId];
  document.getElementById('modal-title').textContent = c.label;
  document.getElementById('modal-subtitle').textContent = `${d.emoji} ${d.label} · vous : ${currentUser}`;
  document.getElementById('score-slider').value = s;
  document.getElementById('score-display').textContent = s;
  document.getElementById('score-display').style.color = scoreColor(s);
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingCrit = null;
  editingDest = null;
}

function updateSlider(v) {
  document.getElementById('score-display').textContent = v;
  document.getElementById('score-display').style.color = scoreColor(parseInt(v));
}

function saveScore() {
  if (!editingCrit || !editingDest) return;
  const v = parseInt(document.getElementById('score-slider').value);
  const c = state.criteria.find(x => x.id === editingCrit);
  c.scores[editingDest] = v;
  closeModal();
  saveState();
}

function updateWeight(critId, val, display) {
  const c = state.criteria.find(x => x.id === critId);
  c.weight = parseInt(val);
  if (display) display.textContent = `×${val}`;
  renderScorecard();
  renderRanking();
}

function addAnnotation() {
  const input = document.getElementById('annot-input');
  const text = input.value.trim();
  if (!text) return;
  if (!state.annotations) state.annotations = [];
  state.annotations.push({ author: currentUser, text, at: new Date().toISOString() });
  input.value = '';
  saveState();
}

function deleteAnnotation(i) {
  state.annotations.splice(i, 1);
  saveState();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// --- POLLING (auto-refresh every 10s) ---
function startPolling() {
  pollingInterval = setInterval(async () => {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      if (result && result.value) {
        const saved = JSON.parse(result.value);
        if (saved.lastModifiedAt !== state.lastModifiedAt) {
          state = { ...DEFAULT_STATE, ...saved };
          setSynced();
          renderAll();
        }
      }
    } catch(e) {}
  }, 10000);
}

// INIT
loadState().then(() => startPolling());
</script>
</body>
</html>
