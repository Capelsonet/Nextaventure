<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retraite — Athènes · Marseille</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B2A4A;--navy-l:#2a3f6a;--gold:#C9A84C;--cream:#F5F1E8;--cream-d:#EDE8DB;--ink:#1a1a1a;--ink-m:#5a5a5a;--ink-f:#9a9a9a;--green:#2D6A4F;--amber:#B8860B;--red:#8B2020;--border:rgba(26,42,74,0.12);--serif:'Cormorant Garamond',Georgia,serif;--mono:'DM Mono',monospace}
html,body{background:var(--cream);color:var(--ink);font-family:var(--serif);min-height:100vh}
header{border-bottom:1px solid var(--border);padding:1.5rem 2rem 1.2rem;display:flex;justify-content:space-between;align-items:flex-end;background:#fff;flex-wrap:wrap;gap:12px}
.title-block h1{font-size:1.7rem;font-weight:300;letter-spacing:-0.02em;color:var(--navy)}
.title-block h1 em{font-style:italic;color:var(--gold)}
.title-block p{margin-top:4px;font-size:0.7rem;font-family:var(--mono);color:var(--ink-f);letter-spacing:0.05em}
.user-select{display:flex;gap:6px;align-items:center}
.user-label{font-size:0.7rem;font-family:var(--mono);color:var(--ink-f);letter-spacing:0.06em;margin-right:4px}
.user-btn{padding:5px 14px;border:1px solid var(--border);border-radius:2px;background:transparent;font-family:var(--serif);font-size:0.82rem;cursor:pointer;color:var(--ink-m);transition:all .2s}
.user-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.sync-bar{background:var(--cream-d);border-bottom:1px solid var(--border);padding:5px 2rem;font-family:var(--mono);font-size:0.68rem;color:var(--ink-f);display:flex;align-items:center;gap:7px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-f);transition:background .3s;flex-shrink:0}
.sync-dot.synced{background:var(--green)}.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
main{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.8rem;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border:none;background:none;font-family:var(--serif);font-size:0.85rem;color:var(--ink-m);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:500}
.panel{display:none}.panel.active{display:block}
.score-grid{display:grid;grid-template-columns:1fr 155px 155px;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:#fff}
.sg-header{background:var(--navy);color:#fff;padding:10px 14px;font-size:0.68rem;font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase}
.sg-header.dest{text-align:center;border-left:1px solid rgba(255,255,255,.1)}
.sg-crit{padding:11px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sg-score{padding:9px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background .15s}
.sg-score:hover{background:var(--cream)}.sg-score:last-child{border-right:none}
.cn{font-size:0.87rem;color:var(--ink);line-height:1.3}.cw{font-size:0.62rem;font-family:var(--mono);color:var(--ink-f);margin-top:3px}
.badge{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:500;color:#fff;transition:transform .15s;flex-shrink:0}
.sg-score:hover .badge{transform:scale(1.1)}
.edit-h{font-size:0.55rem;color:var(--ink-f);opacity:0;transition:opacity .15s}
.sg-score:hover .edit-h{opacity:1}
.total-crit{background:var(--navy);padding:11px 14px;border-right:1px solid rgba(255,255,255,.1)}
.total-score{background:var(--navy);padding:9px 14px;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.1)}
.total-score:last-child{border-right:none}
.tl{font-size:0.62rem;font-family:var(--mono);color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase}
.tv{font-size:1.5rem;font-weight:300;color:var(--gold)}
.rank-dest{margin-bottom:1.8rem}
.rank-name{font-size:1rem;font-weight:300;color:var(--navy);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.rank-total{font-size:0.7rem;font-family:var(--mono);color:var(--ink-f)}
.rank-bar{display:grid;grid-template-columns:160px 1fr 28px;align-items:center;gap:8px;margin-bottom:4px}
.rcn{color:var(--ink-m);font-size:0.73rem}
.rtrack{height:14px;background:var(--cream-d);border-radius:2px;overflow:hidden}
.rfill{height:100%;border-radius:2px;transition:width .6s ease}
.rv{font-family:var(--mono);font-size:0.67rem;color:var(--ink-m);text-align:right}
.detail-item{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:7px}
.detail-head{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--cream-d)}
.dhn{font-size:0.9rem;font-weight:500;color:var(--navy)}
.dhw{font-size:0.63rem;font-family:var(--mono);color:var(--ink-f)}
.detail-body{display:none;padding:14px 16px;font-size:0.82rem;color:var(--ink-m);line-height:1.65}
.detail-body.open{display:block}
.d-ctx{font-size:0.72rem;font-family:var(--mono);color:var(--ink-f);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);font-style:italic}
.d-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
.d-col-title{font-size:0.63rem;font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-f);margin-bottom:5px}
.d-rat{margin-top:6px;font-size:0.74rem;color:var(--ink-f);font-style:italic}
.d-scores{display:flex;align-items:center;gap:16px;padding-top:10px;border-top:1px solid var(--border)}
.ds-item{display:flex;align-items:center;gap:8px}
.ds-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:500;color:#fff}
.ds-dest{font-size:0.73rem;color:var(--ink-m)}
.ds-rat{font-size:0.65rem;font-family:var(--mono);color:var(--ink-f)}
.d-verdict{margin-left:auto;font-size:0.7rem;font-family:var(--mono);color:var(--ink-f)}
.notes-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.note-item{display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:start;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:4px}
.note-author{font-size:0.68rem;font-family:var(--mono);color:var(--ink-f)}
.note-author strong{color:var(--navy);display:block;margin-bottom:2px}
.note-text{font-size:0.85rem;color:var(--ink);line-height:1.5}
.note-del{background:none;border:none;color:var(--ink-f);cursor:pointer;font-size:0.75rem;padding:0 4px}
.note-del:hover{color:var(--red)}
.add-note{display:flex;gap:8px}
.add-note textarea{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-family:var(--serif);font-size:0.85rem;resize:none;height:56px;background:#fff;color:var(--ink)}
.add-note textarea:focus{outline:none;border-color:var(--navy)}
.add-note button{padding:8px 14px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-family:var(--serif);font-size:0.82rem;cursor:pointer;align-self:flex-end}
.notes-title{font-size:0.7rem;font-family:var(--mono);color:var(--ink-f);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem}
.empty-note{font-size:0.8rem;color:var(--ink-f);font-family:var(--mono);padding:6px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:4px;padding:1.6rem;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:0.95rem;font-weight:400;color:var(--navy);margin-bottom:.25rem}
.modal p{font-size:0.68rem;color:var(--ink-f);font-family:var(--mono);margin-bottom:1rem}
.sd{font-size:2.6rem;font-weight:300;color:var(--navy);text-align:center;margin-bottom:.3rem;font-family:var(--serif)}
input[type=range]{width:100%;accent-color:var(--navy);cursor:pointer}
.range-labels{display:flex;justify-content:space-between;font-size:0.62rem;font-family:var(--mono);color:var(--ink-f);margin-top:3px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem}
.bc{padding:6px 13px;border:1px solid var(--border);border-radius:3px;background:none;font-family:var(--serif);cursor:pointer;color:var(--ink-m);font-size:.82rem}
.bs{padding:6px 16px;background:var(--navy);color:#fff;border:none;border-radius:3px;font-family:var(--serif);cursor:pointer;font-size:.82rem}
footer{text-align:center;padding:1.5rem;font-size:0.65rem;font-family:var(--mono);color:var(--ink-f);letter-spacing:.05em;border-top:1px solid var(--border);margin-top:2rem}
@media(max-width:580px){.score-grid{grid-template-columns:1fr 100px 100px}main{padding:1.2rem .8rem}.rank-bar{grid-template-columns:100px 1fr 24px}.d-cols{grid-template-columns:1fr}.note-item{grid-template-columns:1fr auto}.note-author{display:none}}
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1>Retraite — <em>Athènes · Marseille</em></h1>
    <p>outil de décision partagé · étienne & nina</p>
  </div>
  <div class="user-select">
    <span class="user-label">je suis</span>
    <button class="user-btn active" id="btn-e" onclick="setUser('Étienne')">Étienne</button>
    <button class="user-btn" id="btn-n" onclick="setUser('Nina')">Nina</button>
  </div>
</header>
<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-status">connexion…</span>
</div>
<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('scorecard',this)">Scorecard</button>
    <button class="tab-btn" onclick="showTab('ranking',this)">Analyse</button>
    <button class="tab-btn" onclick="showTab('detail',this)">Détail</button>
    <button class="tab-btn" onclick="showTab('notes',this)">Notes</button>
  </div>
  <div id="scorecard" class="panel active"><div class="score-grid" id="score-grid"></div></div>
  <div id="ranking" class="panel"><div id="ranking-wrap"></div></div>
  <div id="detail" class="panel"><div id="detail-grid"></div></div>
  <div id="notes" class="panel">
    <div class="notes-title">Notes & réflexions partagées</div>
    <div class="notes-list" id="notes-list"></div>
    <div class="add-note">
      <textarea id="note-input" placeholder="Ajouter une réflexion…"></textarea>
      <button onclick="addNote()">Ajouter</button>
    </div>
  </div>
</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3><p id="modal-sub"></p>
    <div class="sd" id="score-display">7</div>
    <input type="range" min="1" max="10" value="7" id="score-slider" oninput="updateSlider(this.value)">
    <div class="range-labels"><span>1 — mauvais</span><span>10 — excellent</span></div>
    <div class="ma">
      <button class="bc" onclick="closeModal()">Annuler</button>
      <button class="bs" onclick="saveScore()">Enregistrer</button>
    </div>
  </div>
</div>
<footer>synchronisation automatique toutes les 15s · partagé entre étienne & nina</footer>
<script>
const BIN_ID='69d238e2856a682189ff6399';
const API_KEY='$2a$10$OfoQC5wY0QywVsTs6PprhuCrlSG31D7Ypxk8nOAE6BRP5ISVR1k8a';
const API_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;

const DEFAULT={version:3,
  destinations:[{id:"a",label:"Athènes",emoji:"🇬🇷"},{id:"m",label:"Marseille",emoji:"🇫🇷"}],
  criteria:[
    {id:"cout",label:"Coût de la vie",weight:4,scores:{a:8,m:6},
     context:"Dépenses mensuelles courantes hors loyer pour un couple retraité.",
     detail:{a:"~800€/mois hors loyer (Numbeo). Restaurants : repas du soir pour deux ~25-35€. Épicerie locale (huile d'olive, légumes, poisson) très accessible. Pass transports 5 jours : 9€. Athènes est 20-25% moins cher qu'une grande ville française comparable.",
             m:"~1000€/mois hors loyer (Numbeo). 25-30% moins cher que Paris. Marchés locaux compétitifs, restaurants populaires abordables. Reste une des grandes villes françaises les plus accessibles."},
     rationale:{a:"Avantage net sur quasiment toutes les lignes budgétaires.",m:"Accessible pour la France, mais nettement au-dessus d'Athènes."}},
    {id:"sante",label:"Accès santé",weight:5,scores:{a:5,m:8},
     context:"Qualité du système, accessibilité pour un résident EU, coût réel.",
     detail:{a:"Système public ESY universel mais sous-financé : 27% de satisfaction seulement (OCDE 2025, moyenne : 64%). 12.1% de besoins médicaux non satisfaits (OCDE : 3.4%). Secteur privé de qualité à Athènes (Hygeia, Athens Medical Center), médecins souvent anglophones. Assurance privée conseillée : 1000-3000€/an. Accès via AMKA en tant que citoyen EU retraité.",
             m:"Système universel français mature et fiable. Médecin généraliste, spécialistes, CHU de la Timone reconnu. Remboursements sécu applicables immédiatement. Bureaucratie connue et navigable."},
     rationale:{a:"Risque réel sur le suivi régulier. Privé de qualité mais payant.",m:"Système fiable, prévisible, droits bien établis pour un résident français."}},
    {id:"vols",label:"Vol direct Stockholm",weight:3,scores:{a:9,m:3},
     context:"Fréquence et facilité des vols directs depuis Stockholm Arlanda — pour voir Téa et pour le travail KF.",
     detail:{a:"3 compagnies (Aegean, SAS, Norwegian) — ~10 vols/semaine. Durée : 3h45. Billets dès 48€ aller simple hors saison. Connexion fiable toute l'année.",
             m:"Ryanair uniquement — 1 vol/semaine le mardi, saison limitée. En pratique, correspondance obligatoire via Paris, Amsterdam ou Frankfurt : durée 4-6h, coût 150-300€. Moins spontané."},
     rationale:{a:"Connexion directe robuste, souplesse maximale pendant la transition.",m:"Contrainte logistique significative — chaque visite demande de la planification."}},
    {id:"immo",label:"Prix €/m²",weight:3,scores:{a:8,m:5},
     context:"Prix d'achat au m² pour un appartement de qualité dans les quartiers cibles.",
     detail:{a:"Moyenne transactions réelles : ~2480€/m² (Investropa Q1 2025). Quartiers de qualité (Koukaki, Pangrati) : 2900-3500€/m². Hausse annuelle +7.6%. Pas de TVA ni taxe plus-value jusqu'à fin 2026.",
             m:"Médiane appartements : ~3500€/m² (SeLoger jan. 2026). 7e/8e arrondissement (cible Cité Radieuse) : 5000-6000€/m², voire plus pour les biens d'exception. Hausse +26.9% en 5 ans."},
     rationale:{a:"Budget d'achat nettement inférieur pour une qualité équivalente.",m:"La Cité Radieuse est un rêve cher — budget significativement plus élevé."}},
    {id:"gastro",label:"Gastronomie",weight:3,scores:{a:7,m:9},
     context:"Qualité, diversité et plaisir gastronomique au quotidien.",
     detail:{a:"Cuisine grecque exceptionnelle : tavernas, mézédès, poissons frais du Pirée, huile d'olive première qualité, fromages. Marché central Varvakios remarquable. Cuisine de rue (souvlaki, gyros) excellente et économique. Moins de diversité internationale.",
             m:"Scène gastronomique profonde et diverse : bouillabaisse authentique, fruits de mer, marché du Noailles ('ventre de Marseille'), influence nord-africaine et méditerranéenne, pizzas au feu de bois. Forte culture du marché et du lien social autour de la table."},
     rationale:{a:"Excellence de la tradition grecque, moins de diversité.",m:"Diversité, profondeur populaire et identité gastronomique forte — avantage net."}},
    {id:"liens",label:"Probabilité de liens",weight:5,scores:{a:5,m:9},
     context:"Capacité à créer de vraies amitiés et une communauté intellectuelle en tant qu'étranger.",
     detail:{a:"La philoxenia (hospitalité grecque) est réelle mais peut rester superficielle en ville. Barrière de la langue significative pour aller au-delà de la courtoisie. Communauté expat anglophone présente, mais pas francophone. Intégration profonde difficile sans le grec.",
             m:"Langue commune = accès direct à la vie sociale ordinaire. Culture méditerranéenne du lien vivante : cafés, apéros, voisinage actif. Communautés intellectuelles réelles (Friche, MuCEM, ciné d'auteur). Ville de mélanges, favorable aux nouveaux arrivants."},
     rationale:{a:"Intégration profonde nécessite le grec — barrière réelle à la retraite.",m:"Langue et culture du lien : conditions idéales pour une vraie vie sociale."}},
    {id:"voiture",label:"Vivre sans voiture",weight:3,scores:{a:7,m:7},
     context:"Faisabilité d'une vie quotidienne sans voiture personnelle.",
     detail:{a:"Centre très marchable (Plaka, Monastiraki, Koukaki). 3 lignes de métro + tram côtier + bus. Paiement sans contact depuis 2025. Points négatifs : trottoirs souvent dégradés, chaleur estivale rend la marche difficile juillet-août.",
             m:"Transports publics GRATUITS pour les 65 ans et plus depuis septembre 2025 (RTM). 200 stations VAE leVélo en libre-service. Points négatifs : ville encore voiture-dépendante dans beaucoup de quartiers, 40% des déplacements en voiture selon EMC²."},
     rationale:{a:"Faisable en centre, mais la chaleur estivale complique la mobilité douce.",m:"Gratuité des transports après 65 ans change vraiment la donne — avantage fort sur le long terme."}},
    {id:"culture",label:"Vie culturelle",weight:4,scores:{a:7,m:9},
     context:"Richesse culturelle accessible au quotidien : cinéma, théâtre, expositions, musique, conférences — en particulier en français ou anglais.",
     detail:{a:"Scène très vivante : Festival Athènes-Épidaure (100+ productions, juin-août — Ariane Mnouchkine et Wajdi Mouawad/Juliette Binoche en 2025 à Épidaure). Onassis Stegi pour le contemporain. Musée Benaki, Fondation Goulandris. Cinémas de plein air l'été. Limite : tout ou presque en grec.",
             m:"MuCEM (civilisations Europe-Méditerranée, programmation de premier rang). Friche la Belle de Mai (70 structures, cinéma, théâtre, art contemporain). Festival de Marseille (danse/théâtre, juin-juillet, tarif 10€). Actoral. Tout accessible en français — scène intellectuelle active."},
     rationale:{a:"Offre riche surtout l'été, mais barrière linguistique pour s'y engager vraiment.",m:"Accès complet en français, densité culturelle exceptionnelle pour une ville de 900k hab."}},
    {id:"climat",label:"Climat & confort physique",weight:3,scores:{a:6,m:8},
     context:"Qualité du climat sur 12 mois — chaleur supportable, douceur hivernale, confort au quotidien.",
     detail:{a:"Hivers doux (10-15°C), printemps et automne excellents. Été problématique : canicules récurrentes atteignant 40-43°C (juillet 2025 : Acropole fermée plusieurs fois, 43°C à Sparte). Athènes parmi les capitales européennes les plus vulnérables aux îlots de chaleur (étude 2025). Canicule record de 16 jours en 2023.",
             m:"Climat méditerranéen équilibré : étés chauds mais rarement dangereux (max 35°C), hivers doux, ~300 jours de soleil/an. Le mistral est vivifiant selon les tempéraments. Mer accessible d'avril à novembre. Calanques pour la randonnée. Nettement plus vivable en été qu'Athènes."},
     rationale:{a:"Intersaisons et hivers superbes, mais étés de plus en plus dangereux — risque réel après 65 ans.",m:"Confort thermique supérieur sur l'année entière — critère important pour la santé."}},
    {id:"nature",label:"Accès à la nature",weight:3,scores:{a:6,m:8},
     context:"Proximité de la nature, plein air, et accès équestre pour Nina.",
     detail:{a:"Mer accessible en tram (Glyfada, Vouliagmeni). Collines autour d'Athènes (Hymette, Pendeli, Lycabette). Excursions vers Péloponnèse, cap Sounion, îles du Golfe Saronique (Égine, Hydra). Peu d'options équestres directes près d'Athènes intra-muros, voiture nécessaire pour les randonnées.",
             m:"Calanques nationales à 15 min en bus — randonnées et plongée exceptionnelles. Camargue à 1h30 (chevaux sauvages, centres équestres). Luberon à 1h. Provence équestre : la Crau, les Alpilles offrent des options sérieuses pour Nina. Arrière-pays provençal riche et accessible."},
     rationale:{a:"Belle nature accessible mais morcelée ; peu d'options équestres directes.",m:"Calanques + arrière-pays provençal pour Nina — avantage réel et concret."}},
    {id:"fiscalite",label:"Fiscalité retraite",weight:4,scores:{a:9,m:5},
     context:"Traitement fiscal des pensions étrangères (suédoises) et des revenus d'investissement.",
     detail:{a:"Régime flat tax 7% sur tous revenus étrangers (pensions, dividendes, intérêts) pendant 15 ans — en vigueur depuis 2020. Conditions : ne pas avoir été résident fiscal grec les 5 dernières années, venir d'un pays avec convention fiscale (Suède : oui). Taux libératoire — aucun autre impôt sur revenus étrangers. À vérifier avec un avocat fiscaliste pour les pensions publiques suédoises.",
             m:"Fiscalité française standard progressive (jusqu'à 45%). Pas de régime préférentiel comparable pour les retraités étrangers. CSG/CRDS possiblement applicable. Avantage : système connu, stable, prévisible."},
     rationale:{a:"Avantage fiscal considérable — peut représenter plusieurs milliers d'euros par an.",m:"Fiscalité normale française — aucun avantage spécifique pour les retraités étrangers."}},
    {id:"admin",label:"Facilité administrative",weight:2,scores:{a:4,m:9},
     context:"Facilité de s'installer et de naviguer la vie administrative au quotidien.",
     detail:{a:"Bureaucratie grecque réputée complexe et lente, principalement en grec. Obtenir AMKA (sécu), AFM (fiscal), ouvrir un compte bancaire peut prendre des semaines voire des mois. Processus en amélioration via TAXISnet depuis 2020 mais reste laborieux. Nécessite souvent un avocat ou un intermédiaire local.",
             m:"En tant que citoyen EU s'installant en France : zéro friction. Droits immédiatement applicables. Sécurité sociale, médecin traitant, impôts.gouv.fr — tout navigable seul en français. Mairie, CAF, Ameli : processus documentés et clairs."},
     rationale:{a:"Installation significativement plus complexe — risque de frustration et de délais importants.",m:"Démarches simples et prévisibles — énergie préservée pour l'essentiel de la vie."}},
    {id:"famille",label:"Proximité de Téa",weight:4,scores:{a:7,m:6},
     context:"Facilité de voir Téa à Stockholm — fréquence des visites possibles, coût, spontanéité.",
     detail:{a:"Vols directs multiples (Aegean, SAS, Norwegian) ~10/semaine. Durée : 3h45. Billets dès 48€ aller simple. Connexion parmi les meilleures Méditerranée-Scandinavie — possibilité de visites fréquentes et spontanées.",
             m:"Pas de vol direct fiable (Ryanair 1x/semaine en saison). Correspondance obligatoire via Paris, Amsterdam ou Frankfurt : durée totale 4-6h, coût 150-300€. Alternative : TGV Paris (3h) + vol Paris-Stockholm. Moins spontané mais tout à fait faisable pour des visites planifiées."},
     rationale:{a:"Connexion directe régulière — facilite les allers-retours spontanés pour voir Téa.",m:"Moins direct mais pas insurmontable pour des visites planifiées à l'avance."}}
  ],
  notes:[],lastModifiedBy:null,lastModifiedAt:null
};

let S=JSON.parse(JSON.stringify(DEFAULT));
let eC=null,eD=null,currentUser='Étienne',lastKnownAt=null;

function sc(s){return s>=8?'#2D6A4F':s>=6?'#B8860B':'#8B2020'}
function wt(id){let s=0,w=0;S.criteria.forEach(c=>{s+=c.scores[id]*c.weight;w+=c.weight});return Math.round(s/w*10)/10}

function mergeCriteria(defs,saved){
  return defs.map(def=>{
    const f=saved.find(s=>s.id===def.id);
    return f?{...def,...f,detail:def.detail,context:def.context,rationale:def.rationale}:def;
  });
}

async function loadFromBin(){
  setSyncing();
  try{
    const res=await fetch(API_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
    if(res.ok){
      const data=await res.json();
      if(data&&data.version){
        S={...DEFAULT,...data,criteria:mergeCriteria(DEFAULT.criteria,data.criteria||[]),notes:data.notes||[]};
        lastKnownAt=S.lastModifiedAt;
      }
      setSynced();
    }else{await saveToBin();}
  }catch(e){setError('hors ligne — modifications locales uniquement');}
  renderAll();
}

async function saveToBin(){
  setSyncing();
  S.lastModifiedBy=currentUser;S.lastModifiedAt=new Date().toISOString();lastKnownAt=S.lastModifiedAt;
  try{
    const res=await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(S)});
    if(res.ok){setSynced();}else{setError('erreur de sauvegarde');}
  }catch(e){setError('hors ligne — réessayez');}
  renderAll();
}

async function pollForUpdates(){
  try{
    const res=await fetch(API_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
    if(res.ok){
      const data=await res.json();
      if(data&&data.lastModifiedAt&&data.lastModifiedAt!==lastKnownAt){
        S={...DEFAULT,...data,criteria:mergeCriteria(DEFAULT.criteria,data.criteria||[]),notes:data.notes||[]};
        lastKnownAt=S.lastModifiedAt;setSynced();renderAll();
      }
    }
  }catch(e){}
}

function setSyncing(){document.getElementById('sync-dot').className='sync-dot syncing';document.getElementById('sync-status').textContent='synchronisation…';}
function setSynced(){
  document.getElementById('sync-dot').className='sync-dot synced';
  const who=S.lastModifiedBy,when=S.lastModifiedAt?new Date(S.lastModifiedAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';
  document.getElementById('sync-status').textContent=who?`synchronisé · dernière modif par ${who} à ${when}`:'synchronisé';
}
function setError(msg){document.getElementById('sync-dot').className='sync-dot error';document.getElementById('sync-status').textContent=msg;}

function renderAll(){renderScorecard();renderRanking();renderDetail();renderNotes();}

function renderScorecard(){
  let h=`<div class="sg-header">Critère</div>`;
  S.destinations.forEach(d=>h+=`<div class="sg-header dest">${d.emoji} ${d.label}</div>`);
  S.criteria.forEach(c=>{
    h+=`<div class="sg-crit"><div class="cn">${c.label}</div><div class="cw">poids ×${c.weight}</div></div>`;
    S.destinations.forEach(d=>{
      const s=c.scores[d.id];
      h+=`<div class="sg-score" onclick="openModal('${c.id}','${d.id}')"><span class="badge" style="background:${sc(s)}">${s}</span><span class="edit-h">✎</span></div>`;
    });
  });
  h+=`<div style="display:contents"><div class="total-crit"><div class="tl">Total pondéré</div></div>`;
  S.destinations.forEach(d=>h+=`<div class="total-score"><div class="tv">${wt(d.id)}</div></div>`);
  h+=`</div>`;
  document.getElementById('score-grid').innerHTML=h;
}

function renderRanking(){
  const tots=S.destinations.map(d=>({...d,total:wt(d.id)})).sort((a,b)=>b.total-a.total);
  let h='';
  tots.forEach(d=>{
    h+=`<div class="rank-dest"><div class="rank-name">${d.emoji} ${d.label}<span class="rank-total">— ${d.total}/10</span></div>`;
    const sorted=[...S.criteria].sort((a,b)=>(b.scores[d.id]*b.weight)-(a.scores[d.id]*a.weight));
    sorted.forEach(c=>{
      const s=c.scores[d.id];
      h+=`<div class="rank-bar"><div class="rcn">${c.label}</div><div class="rtrack"><div class="rfill" style="width:${s*10}%;background:${sc(s)}"></div></div><div class="rv">${s}</div></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('ranking-wrap').innerHTML=h;
}

function renderDetail(){
  let h='';
  S.criteria.forEach(c=>{
    const sa=c.scores.a,sm=c.scores.m;
    h+=`<div class="detail-item">
      <div class="detail-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="dhn">${c.label}</span><span class="dhw">poids ×${c.weight} ▸</span>
      </div>
      <div class="detail-body">
        ${c.context?`<div class="d-ctx">${c.context}</div>`:''}
        <div class="d-cols">
          <div>
            <div class="d-col-title">🇬🇷 Athènes</div>
            <div>${c.detail&&c.detail.a?c.detail.a:''}</div>
            ${c.rationale&&c.rationale.a?`<div class="d-rat">${c.rationale.a}</div>`:''}
          </div>
          <div>
            <div class="d-col-title">🇫🇷 Marseille</div>
            <div>${c.detail&&c.detail.m?c.detail.m:''}</div>
            ${c.rationale&&c.rationale.m?`<div class="d-rat">${c.rationale.m}</div>`:''}
          </div>
        </div>
        <div class="d-scores">
          <div class="ds-item">
            <span class="ds-badge" style="background:${sc(sa)}">${sa}</span>
            <div><div class="ds-dest">🇬🇷 Athènes</div><div class="ds-rat">${sa>=8?'fort avantage':sa>=6?'satisfaisant':'point faible'}</div></div>
          </div>
          <div class="ds-item">
            <span class="ds-badge" style="background:${sc(sm)}">${sm}</span>
            <div><div class="ds-dest">🇫🇷 Marseille</div><div class="ds-rat">${sm>=8?'fort avantage':sm>=6?'satisfaisant':'point faible'}</div></div>
          </div>
          <div class="d-verdict">${sa>sm?'🇬🇷 avantage':sm>sa?'🇫🇷 avantage':'égalité'}</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('detail-grid').innerHTML=h;
}

function renderNotes(){
  const list=document.getElementById('notes-list');
  if(!S.notes||!S.notes.length){list.innerHTML=`<p class="empty-note">aucune note pour l'instant</p>`;return;}
  let h='';
  S.notes.forEach((n,i)=>{
    const when=new Date(n.at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    h+=`<div class="note-item"><div class="note-author"><strong>${n.author}</strong>${when}</div><div class="note-text">${n.text}</div><button class="note-del" onclick="delNote(${i})">✕</button></div>`;
  });
  list.innerHTML=h;
}

function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
}
function setUser(n){
  currentUser=n;
  document.getElementById('btn-e').classList.toggle('active',n==='Étienne');
  document.getElementById('btn-n').classList.toggle('active',n==='Nina');
}
function openModal(cid,did){
  eC=cid;eD=did;
  const c=S.criteria.find(x=>x.id===cid),d=S.destinations.find(x=>x.id===did),s=c.scores[did];
  document.getElementById('modal-title').textContent=c.label;
  document.getElementById('modal-sub').textContent=`${d.emoji} ${d.label} · ${currentUser}`;
  document.getElementById('score-slider').value=s;
  document.getElementById('score-display').textContent=s;
  document.getElementById('score-display').style.color=sc(s);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');eC=null;eD=null;}
function updateSlider(v){document.getElementById('score-display').textContent=v;document.getElementById('score-display').style.color=sc(parseInt(v));}
function saveScore(){
  if(!eC||!eD)return;
  S.criteria.find(x=>x.id===eC).scores[eD]=parseInt(document.getElementById('score-slider').value);
  closeModal();saveToBin();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function addNote(){
  const inp=document.getElementById('note-input'),txt=inp.value.trim();
  if(!txt)return;
  if(!S.notes)S.notes=[];
  S.notes.push({author:currentUser,text:txt,at:new Date().toISOString()});
  inp.value='';saveToBin();
}
function delNote(i){S.notes.splice(i,1);saveToBin();}

loadFromBin();
setInterval(pollForUpdates,15000);
</script>
</body>
</html>
